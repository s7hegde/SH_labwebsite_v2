
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Grotesk:wght@300;500;700&family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,700;1,400&family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: transparent; font-family: var(--font-sans); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 16px 0;
  }

  .logo-card {
    background: var(--color-background-secondary);
    border: 1px solid var(--color-border-tertiary);
    border-radius: 14px;
    padding: 28px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .logo-card:hover {
    border-color: var(--color-border-primary);
  }

  .logo-card svg {
    width: 100%;
    max-width: 260px;
    height: auto;
  }

  .logo-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }

  .section-title {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 4px;
    padding-left: 2px;
  }
</style>
